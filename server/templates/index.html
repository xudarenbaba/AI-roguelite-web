<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Roguelite 网页演示</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <div class="layout">
      <section class="game-panel">
        <canvas id="gameCanvas" width="960" height="540"></canvas>
        <div class="hud">
          <div id="hudStats"></div>
          <p class="tips">
            移动：WASD/方向键 | 射击：空格 | 通过对话控制烬的姿态（守护 / 突击 / 游击）
          </p>
        </div>
      </section>

      <aside class="chat-panel">
        <h2>战友：烬</h2>
        <div id="chatLog" class="chat-log"></div>
        <form id="chatForm">
          <input id="chatInput" autocomplete="off" maxlength="160" placeholder="输入战术指令或情绪交流..." />
          <button type="submit">发送</button>
        </form>
      </aside>
    </div>

    <script src="/static/game.js"></script>
  </body>
</html>
